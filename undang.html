            </h2>
            
            <!-- Language Selection -->
            <div class="mb-8 p-4 bg-brand-50 dark:bg-gray-700 rounded-xl">
                <label class="block text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-300 mb-3" x-text="txt[lang].lbl_lang"></label>
                <div class="grid grid-cols-2 gap-4">

                        <span>🇲🇾</span> <span x-text="txt[lang].lang_ms"></span>

                        <span>🇬🇧</span> <span x-text="txt[lang].lang_en"></span>
                    </button>
                </div>
            </div>

            <!-- Dark/Light Mode -->
            <div class="mb-8">
                <label class="block text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-300 mb-3" x-text="txt[lang].lbl_mode"></label>

                    <button @click="toggleDark(false)" class="p-4 rounded-xl border-2 flex flex-col items-center gap-2 transition"

            <!-- Text Size Options -->
            <div class="mb-8">

            <div class="flex items-center gap-3 md:gap-6">
                <a href="index.html" class="font-bold hover:text-brand-600 transition" x-text="txt[lang].menu_home">Utama</a>
                <a href="#akta" class="font-bold hover:text-brand-600 transition" x-text="txt[lang].menu_akta">Akta OKU</a>
                <a href="#hak" class="font-bold hover:text-brand-600 transition" x-text="txt[lang].menu_hak">20 Hak</a>
                <a href="#guaman" class="font-bold hover:text-brand-600 transition" x-text="txt[lang].menu_guaman">Bantuan Guaman</a>
                
               <button @click="showSettings = true" class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-4 md:px-5 py-2 rounded-full font-bold text-sm hover:opacity-80 transition flex items-center gap-2 shadow-xl">

                            </a>

                    </div>
                </div>

                    <div :class="msg.sender === 'bot' ? 'flex justify-start' : 'flex justify-end'">

                    </div>
                </template>
            </div>

                initApp() {
                    if (this.$store?.prefs) {
                        const prefs = this.$store.prefs;
                        this.lang = prefs.lang;
                        this.isDark = prefs.isDark;
                        this.currentFontSize = prefs.fontSize;
                        
                        prefs.applyTheme(this.isDark);
                        document.documentElement.style.fontSize = this.currentFontSize + 'px';
                    } else {
                        const savedLang = localStorage.getItem('myoku_lang');
                        const savedDark = localStorage.getItem('myoku_dark');
                        const savedFont = localStorage.getItem('myoku_font');
                        
                        if (savedLang) this.lang = savedLang;
                        if (savedFont) {
                            this.currentFontSize = parseInt(savedFont);
                            document.documentElement.style.fontSize = this.currentFontSize + 'px';
                        }
                        if (savedDark === 'true') {
                            this.isDark = true;
                            document.documentElement.classList.add('dark');
                        } else if (savedDark === 'false') {
                            document.documentElement.classList.remove('dark');
                        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                            this.isDark = true;
                            document.documentElement.classList.add('dark');
                        }
                    }
                },
                
                setLang(val) {
                    this.lang = val;
                    if (this.$store?.prefs) {
                        this.$store.prefs.setLang(val);
                    } else {
                        localStorage.setItem('myoku_lang', val);
                    }
                },

                toggleDark(val) {
                    this.isDark = val;
                    if (this.$store?.prefs) {
                        this.$store.prefs.setDark(val);
                    } else {
                        localStorage.setItem('myoku_dark', val);
                        if (val) document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                    }
                },

                setFontSize(size) {
                    this.currentFontSize = size;
                    if (this.$store?.prefs) {
                        this.$store.prefs.setFontSize(size);
                    } else {
                        localStorage.setItem('myoku_font', size);
                        document.documentElement.style.fontSize = size + 'px';
                    }
                },
                
                applyTextSize() {
                    document.body.classList.remove('text-small', 'text-medium', 'text-large');
                    document.body.classList.add(`text-${this.textSize}`);
                    localStorage.setItem('textSize', this.textSize);
                },
                
                sendMessage() {
                    if(!this.userMsg.trim()) return;
                    
                    this.messages.push({ id: Date.now(), text: this.userMsg, sender: 'user' });
                    let userQuestion = this.userMsg;
                    this.userMsg = '';
                    
                    setTimeout(() => {
                        let botReply;
                        if (this.lang === 'ms') {
                            botReply = 'Terima kasih. Untuk bantuan segera, sila hubungi talian JBG di 03-2261 7000 atau YBGK di 1-800-88-9245. Untuk 20 hak asasi, rujuk bahagian di atas. Jika anda perlukan bantuan khusus, sila hubungi organisasi berkaitan.';
                        } else {
                            botReply = 'Thank you. For immediate assistance, please contact JBG hotline at 03-2261 7000 or YBGK at 1-800-88-9245. For the 20 basic rights, refer to the section above. If you need specific help, please contact the relevant organization.';
                        }
                        
                        this.messages.push({ id: Date.now(), text: botReply, sender: 'bot' });
                        this.$nextTick(() => {
                            let chatBox = document.getElementById('chat-messages');
                            if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
                        });
                    }, 1000);
                }
            }
